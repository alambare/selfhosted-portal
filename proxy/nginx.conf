server {
  listen 8080;

  # ── Fake Authelia headers (dev only) ──────────────────────────────────────
  # These are substituted from compose.yml environment variables.
  # In production the real reverse proxy injects them after Authelia auth.

  location /whoami {
    proxy_pass         http://backend:8080;
    proxy_set_header   Host              $host;
    proxy_set_header   Remote-User       ${FAKE_REMOTE_USER};
    proxy_set_header   Remote-Name       ${FAKE_REMOTE_NAME};
    proxy_set_header   Remote-Email      ${FAKE_REMOTE_EMAIL};
    proxy_set_header   Remote-Groups     ${FAKE_REMOTE_GROUPS};
  }

  location / {
    proxy_pass         http://frontend:8080;
    proxy_set_header   Host              $host;
  }
}
