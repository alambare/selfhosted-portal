name: Publish images

# Triggered automatically when release-please creates a new semver tag.
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build and publish (e.g. v0.1.0)"
        required: true

env:
  REGISTRY: ghcr.io

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Build & push ${{ matrix.component }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - component: backend
            dockerfile: docker/backend.Dockerfile
          - component: frontend
            dockerfile: docker/frontend.Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', github.event.inputs.tag) || github.ref }}

      # ghcr.io requires lowercase owner names
      - name: Normalise owner to lowercase
        run: |
          echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" \
            >> "$GITHUB_ENV"
          # Expose the effective semver (strip leading 'v') for metadata-action
          RAW="${{ github.event.inputs.tag || github.ref_name }}"
          echo "EFFECTIVE_TAG=${RAW#v}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/portal-${{ matrix.component }}
          tags: |
            type=semver,pattern={{version}},value=${{ env.EFFECTIVE_TAG }}
            type=semver,pattern={{major}}.{{minor}},value=${{ env.EFFECTIVE_TAG }}
            type=semver,pattern={{major}},value=${{ env.EFFECTIVE_TAG }}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags:   ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
